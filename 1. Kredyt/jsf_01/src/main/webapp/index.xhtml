<h:head>
	<title>JSF 01 - Kalkulator kredytowy</title>
</h:head>
<h:body>

	<h1>JSF 01 - Kalkulator kredytowy</h1>

	<h:form id="bla">

		<br />
  		Raty(msc): <h:inputText value="#{calcBB.y}" />

		<h:commandButton value="Przelicz" action="#{calcBB.calc()}"/>
		<br />
		
	</h:form>
